[build]
publish = "."
functions = "netlify/functions"

[build.environment]
NODE_VERSION = "22"

[build.processing]

  [build.processing.css]

  [build.processing.html]

  [build.processing.images]

  [build.processing.js]

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

[functions]

  [functions."*"]
  node_bundler = "esbuild"

[[headers]]
for = "/thankyou.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"
  Expires = "0"

[[headers]]
for = "/*.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"
  Expires = "0"

[[headers]]
for = "/*.js"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"
  Expires = "0"

[[headers]]
for = "/*.css"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"
  Expires = "0"

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Content-Language = "es"

[[redirects]]
from = "/"
to = "/index.html"
status = 200
force = false

[[redirects]]
from = "/en"
to = "https://ai4websitedesign.com"
status = 301
force = false

[[redirects]]
from = "/estudio"
to = "/ai4-design-studio.html"
status = 200
force = false

[[redirects]]
from = "/vista-previa"
to = "/ai4-design-studio-preview.html"
status = 200
force = false

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

[build]
publish = "."
functions = "netlify/functions"
command = "npm run build"

[build.environment]
NODE_VERSION = "20"

[build.processing]

  [build.processing.css]

  [build.processing.html]

  [build.processing.images]

  [build.processing.js]

[functions]

  [functions."*"]
  node_bundler = "esbuild"

[[headers]]
for = "/thankyou.html"

  [headers.values]
  Cache-Control = "no-cache, no-store, must-revalidate"
  Pragma = "no-cache"
  Expires = "0"

[[headers]]
for = "/*"

  [headers.values]
  X-Frame-Options = "DENY"
  X-Content-Type-Options = "nosniff"
  Referrer-Policy = "strict-origin-when-cross-origin"
  Content-Language = "es"

[[redirects]]
from = "/"
to = "/index.html"
status = 200
force = false

[[redirects]]
from = "/en"
to = "https://ai4websitedesign.com"
status = 301
force = false

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
force = false

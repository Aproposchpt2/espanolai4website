<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verificar Código de Acceso — AI4 Diseño de Sitios Web</title>
<meta name="description" content="Verifica tu código de acceso de miembro de AI4 Diseño de Sitios Web.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#030816;--bg2:#061225;--panel:rgba(8,24,47,.78);--line:rgba(184,196,217,.15);
  --blue:#1EA7FF;--blue4:#5BD3FF;--silver:#D5DEEA;--white:#F5F8FF;--muted:#AEBED3;--muted2:#90A3BC;
  --display:'Syne',sans-serif;--sans:'Inter',sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at 18% 12%,rgba(30,167,255,.20),transparent 28%),radial-gradient(circle at 82% 10%,rgba(91,211,255,.10),transparent 30%),linear-gradient(180deg,var(--bg) 0%,#02050e 54%,var(--bg2) 100%);color:var(--muted);font-family:var(--sans);line-height:1.65;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(45,184,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(45,184,255,.035) 1px,transparent 1px);background-size:64px 64px;mask-image:linear-gradient(180deg,rgba(0,0,0,.75),rgba(0,0,0,.22) 62%,rgba(0,0,0,.05));}
a{color:inherit}button,input{font:inherit}
.shell{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}
nav{min-height:76px;display:flex;align-items:center;justify-content:space-between;gap:1rem;padding:.75rem clamp(1rem,4vw,2.5rem);background:rgba(3,8,22,.76);backdrop-filter:blur(20px);border-bottom:1px solid rgba(184,196,217,.11);}
.brand{display:flex;align-items:center;gap:.78rem;text-decoration:none;color:var(--white)}
.brand img{width:58px;height:36px;border-radius:12px;object-fit:cover;background:rgba(255,255,255,.04);border:1px solid rgba(91,211,255,.22);box-shadow:0 0 24px rgba(30,167,255,.18);}
.brand-name{font-family:var(--display);font-size:.92rem;font-weight:800;letter-spacing:.02em}
.brand-sub{display:block;font-family:var(--mono);font-size:.58rem;color:var(--muted2);letter-spacing:.14em;text-transform:uppercase}
.nav-link{color:var(--muted);font-size:.84rem;font-weight:800;text-decoration:none}
.nav-link:hover{color:var(--white)}
main{flex:1;display:grid;place-items:center;padding:clamp(2rem,6vw,5rem) 1rem}
.card{width:min(520px,100%);position:relative;overflow:hidden;border:1px solid var(--line);border-radius:32px;background:linear-gradient(145deg,rgba(255,255,255,.07),rgba(255,255,255,.018)),var(--panel);box-shadow:0 28px 90px rgba(0,0,0,.42);padding:clamp(1.35rem,4vw,2.25rem);}
.card::before{content:'';position:absolute;inset:0;pointer-events:none;background:linear-gradient(120deg,rgba(255,255,255,.12),transparent 24%),radial-gradient(circle at 20% 0%,rgba(45,184,255,.18),transparent 36%);}
.card>*{position:relative;z-index:1}
.eyebrow{display:inline-flex;align-items:center;gap:.55rem;font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--blue4);letter-spacing:.18em;text-transform:uppercase;margin-bottom:1rem;}
.eyebrow::before{content:'';width:34px;height:1px;background:linear-gradient(90deg,var(--blue),transparent);box-shadow:0 0 16px rgba(30,167,255,.65);}
h1{color:var(--white);font-family:var(--display);font-size:clamp(2.2rem,7vw,3.55rem);line-height:.98;letter-spacing:-.06em;margin-bottom:.9rem;}
.copy{color:var(--silver);font-size:1rem;margin-bottom:1.45rem}
.field{margin-bottom:1rem}
label{display:block;color:var(--silver);font-size:.78rem;font-weight:900;margin-bottom:.42rem}
input{width:100%;border:1px solid rgba(184,196,217,.16);border-radius:14px;background:rgba(255,255,255,.045);color:var(--white);padding:.95rem 1rem;outline:none;}
.code-input{text-align:center;font-family:var(--mono);font-size:1.7rem;letter-spacing:.28em;font-weight:900;}
input:focus{border-color:rgba(91,211,255,.58);box-shadow:0 0 0 3px rgba(30,167,255,.12)}
.btn{width:100%;min-height:50px;display:inline-flex;align-items:center;justify-content:center;border:1px solid rgba(245,248,255,.58);border-radius:999px;color:#03101f;background:linear-gradient(135deg,var(--white),var(--blue4) 44%,var(--blue));box-shadow:0 0 36px rgba(30,167,255,.34),inset 0 1px 0 rgba(255,255,255,.74);font-weight:950;cursor:pointer;transition:transform .2s ease,box-shadow .2s ease,opacity .2s ease;}
.btn:hover{transform:translateY(-1px);box-shadow:0 0 48px rgba(30,167,255,.46)}
.btn:disabled{opacity:.68;cursor:not-allowed;transform:none}
.secondary{width:100%;min-height:44px;margin-top:.8rem;border-radius:999px;border:1px solid rgba(213,222,234,.18);background:rgba(255,255,255,.045);color:var(--white);font-weight:850;cursor:pointer;}
.status{display:none;margin:0 0 1rem;border-radius:14px;padding:.75rem .9rem;font-size:.86rem;line-height:1.45;border:1px solid rgba(184,196,217,.16);background:rgba(255,255,255,.045);}
.status.error{display:block;color:#fecaca;border-color:rgba(248,113,113,.25);background:rgba(248,113,113,.08)}
.status.ok{display:block;color:#bbf7d0;border-color:rgba(74,222,128,.25);background:rgba(74,222,128,.08)}
.helper{margin-top:1rem;color:var(--muted2);font-size:.86rem;text-align:center}
.helper a{color:var(--blue4);font-weight:900;text-decoration:none}
footer{padding:1.5rem;text-align:center;color:var(--muted2);font-size:.82rem}
@media(max-width:640px){.brand-sub{display:none}.brand img{width:48px;height:30px}}
</style>
</head>
<body>
<div class="shell">
  <nav>
    <a class="brand" href="index.html" aria-label="AI4 Diseño de Sitios Web inicio">
      <img src="ai4-approved-logo.png" alt="AI4 Diseño de Sitios Web logo">
      <span>
        <span class="brand-name">AI4 Diseño de Sitios Web</span>
        <span class="brand-sub">Verificar Acceso</span>
      </span>
    </a>
    <a class="nav-link" href="login.html">Volver a Iniciar Sesión</a>
  </nav>

  <main>
    <section class="card" aria-labelledby="verifyTitle">
      <div class="eyebrow">Código de Acceso</div>
      <h1 id="verifyTitle">Revisa tu correo.</h1>
      <p class="copy">Ingresa el código de 6 dígitos que enviamos a <strong id="emailDisplay" style="color:var(--white)">tu correo electrónico</strong>.</p>

      <form id="verifyForm" novalidate>
        <div class="field">
          <label for="code">Código de 6 Dígitos</label>
          <input id="code" class="code-input" name="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" placeholder="000000" required>
        </div>

        <div id="status" class="status" role="status" aria-live="polite"></div>

        <button id="submitBtn" class="btn" type="submit">Verificar y Continuar</button>
        <button id="resendBtn" class="secondary" type="button">Reenviar Código</button>
      </form>

      <p class="helper">¿Necesitas usar otro correo? <a href="login.html">Volver a Iniciar Sesión</a>.</p>
    </section>
  </main>

  <footer>© 2026 Apropos Group LLC · espanola.ai4websitedesign.com</footer>
</div>

<script>
'use strict';

const params = new URLSearchParams(window.location.search);
const queryEmail = params.get('email') || '';
let email = queryEmail;

try {
  email = email || sessionStorage.getItem('ai4_pending_login_email') || localStorage.getItem('ai4_pending_login_email') || '';
} catch(e) {}

const form = document.getElementById('verifyForm');
const codeInput = document.getElementById('code');
const statusBox = document.getElementById('status');
const submitBtn = document.getElementById('submitBtn');
const resendBtn = document.getElementById('resendBtn');
const emailDisplay = document.getElementById('emailDisplay');

function showStatus(message, type) {
  statusBox.textContent = message;
  statusBox.className = 'status ' + type;
}

function cleanCode(value) {
  return String(value || '').replace(/\D/g, '').slice(0, 6);
}

if (email) {
  emailDisplay.textContent = email;
} else {
  showStatus('No se encontró correo de inicio de sesión. Vuelve a Iniciar Sesión y solicita un nuevo código.', 'error');
  submitBtn.disabled = true;
}

codeInput.addEventListener('input', () => {
  codeInput.value = cleanCode(codeInput.value);
});

form.addEventListener('submit', async (event) => {
  event.preventDefault();

  const code = cleanCode(codeInput.value);
  if (!email) {
    showStatus('Vuelve a Iniciar Sesión y solicita un nuevo código.', 'error');
    return;
  }

  if (code.length !== 6) {
    showStatus('Por favor ingresa el código de acceso de 6 dígitos.', 'error');
    return;
  }

  submitBtn.disabled = true;
  submitBtn.textContent = 'Verificando...';
  showStatus('Verificando tu código de acceso.', 'ok');

  try {
    const res = await fetch('/.netlify/functions/verify-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'El código no pudo verificarse. Inténtalo de nuevo.');
    }

    const userName = data.user?.name || '';
    const userEmail = data.user?.email || email;

    try {
      sessionStorage.setItem('ai4_portal_email', userEmail);
      sessionStorage.setItem('ai4_portal_name', userName);
      localStorage.setItem('ai4_portal_email', userEmail);
      localStorage.setItem('ai4_portal_name', userName);
      sessionStorage.removeItem('ai4_pending_login_email');
      localStorage.removeItem('ai4_pending_login_email');
    } catch(e) {}

    window.location.href = 'portal.html';
  } catch (err) {
    showStatus(err.message || 'El código no pudo verificarse. Inténtalo de nuevo.', 'error');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Verificar y Continuar';
  }
});

resendBtn.addEventListener('click', async () => {
  if (!email) {
    showStatus('Vuelve a Iniciar Sesión y solicita un nuevo código.', 'error');
    return;
  }

  resendBtn.disabled = true;
  resendBtn.textContent = 'Reenviando...';

  try {
    const res = await fetch('/.netlify/functions/send-otp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok || !data.success) {
      throw new Error(data.error || 'No se pudo reenviar el código. Inténtalo de nuevo.');
    }

    showStatus('Se envió un nuevo código de acceso.', 'ok');
  } catch (err) {
    showStatus(err.message || 'No se pudo reenviar el código. Inténtalo de nuevo.', 'error');
  } finally {
    resendBtn.disabled = false;
    resendBtn.textContent = 'Reenviar Código';
  }
});

window.addEventListener('load', () => {
  codeInput.focus();
});
</script>
</body>
</html>

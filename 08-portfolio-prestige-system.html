<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{BUSINESS_NAME}} — Portfolio Prestige System</title>
  <style>
    :root{
      --paper:#f8f4ea;
      --ink:#151515;
      --graphite:#2c2b28;
      --olive:#7a8066;
      --line:rgba(21,21,21,.14);
      --white:#fffdf7;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      color:var(--ink);
      background:var(--paper);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    a{text-decoration:none;color:inherit}
    .portfolio{
      min-height:100vh;
      display:grid;
      grid-template-columns:1fr minmax(340px,44vw);
    }
    .left{
      padding:28px clamp(20px,5vw,70px) 70px;
      display:grid;
      grid-template-rows:auto 1fr auto;
      min-height:100vh;
    }
    nav{
      display:flex;
      justify-content:space-between;
      align-items:center;
      text-transform:uppercase;
      letter-spacing:.17em;
      font-size:11px;
      color:rgba(21,21,21,.66);
    }
    .brand{font-weight:950;color:var(--ink);letter-spacing:.2em}
    .copy{
      align-self:center;
      padding:50px 0;
    }
    .eyebrow{
      color:var(--olive);
      text-transform:uppercase;
      letter-spacing:.25em;
      font-size:12px;
      margin-bottom:24px;
    }
    h1{
      margin:0;
      font-family:Georgia,"Times New Roman",serif;
      font-size:clamp(50px,7.6vw,118px);
      line-height:.88;
      letter-spacing:-.07em;
      font-weight:400;
      max-width:950px;
    }
    .description{
      margin:28px 0 34px;
      max-width:610px;
      color:rgba(21,21,21,.67);
      line-height:1.72;
      font-size:clamp(16px,1.45vw,20px);
    }
    .actions{display:flex;gap:14px;flex-wrap:wrap}
    .primary{
      padding:17px 24px;
      border-radius:999px;
      background:var(--ink);
      color:var(--white);
      font-weight:850;
    }
    .secondary{
      padding:16px 22px;
      border:1px solid var(--line);
      border-radius:999px;
    }
    .services{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:1px;
      background:var(--line);
      border:1px solid var(--line);
    }
    .service{
      background:var(--paper);
      padding:22px;
      min-height:145px;
    }
    .service small{
      color:var(--olive);
      letter-spacing:.18em;
      text-transform:uppercase;
      font-size:10px;
    }
    .service p{
      margin:26px 0 0;
      line-height:1.25;
      font-weight:800;
      letter-spacing:-.02em;
    }
    .right{
      min-height:100vh;
      border-left:1px solid var(--line);
      padding:28px;
      background:
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(var(--line) 1px, transparent 1px),
        var(--graphite);
      background-size:52px 52px;
      display:grid;
      place-items:center;
      position:relative;
      overflow:hidden;
    }
    .right::before{
      content:"";
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 28%, rgba(248,244,234,.22), transparent 35%);
    }
    .stack{
      width:min(430px,100%);
      height:620px;
      position:relative;
      z-index:1;
    }
    .piece{
      position:absolute;
      border:1px solid rgba(248,244,234,.22);
      border-radius:28px;
      background:rgba(248,244,234,.08);
      backdrop-filter:blur(12px);
      box-shadow:0 36px 90px rgba(0,0,0,.32);
      overflow:hidden;
    }
    .piece::after{
      content:"";
      position:absolute;
      inset:20px;
      border:1px solid rgba(248,244,234,.14);
      border-radius:20px;
    }
    .piece.a{inset:0 12% 18% 0;transform:rotate(-5deg);background:linear-gradient(135deg,rgba(248,244,234,.3),rgba(122,128,102,.14))}
    .piece.b{inset:18% 0 0 18%;transform:rotate(6deg);background:linear-gradient(135deg,rgba(248,244,234,.12),rgba(248,244,234,.26))}
    .piece.c{inset:28% 18% 22% 9%;transform:rotate(0);background:radial-gradient(circle at 40% 28%,rgba(248,244,234,.5),rgba(122,128,102,.2))}
    .caption{
      position:absolute;
      left:28px;
      right:28px;
      bottom:28px;
      z-index:2;
      padding:20px;
      border-radius:18px;
      background:rgba(21,21,21,.6);
      color:rgba(248,244,234,.82);
      border:1px solid rgba(248,244,234,.16);
      text-transform:uppercase;
      letter-spacing:.16em;
      font-size:10px;
    }
    @media(max-width:980px){
      .portfolio{grid-template-columns:1fr}
      .left{min-height:auto}
      nav{flex-direction:column;align-items:flex-start;gap:12px}
      .right{min-height:520px;border-left:0;border-top:1px solid var(--line);order:-1}
      .stack{height:430px}
      h1{font-size:clamp(48px,14vw,86px)}
      .services{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="portfolio">
    <section class="left">
      <nav>
        <a class="brand" href="{{CTA_LINK}}">{{BUSINESS_NAME}}</a>
        <span>{{CITY}} · {{PHONE}}</span>
      </nav>

      <section class="copy">
        <div class="eyebrow">Portfolio Prestige System</div>
        <h1>{{HEADLINE}}</h1>
        <p class="description">{{DESCRIPTION}}</p>
        <div class="actions">
          <a class="primary" href="{{CTA_LINK}}">{{CTA_TEXT}}</a>
          <a class="secondary" href="tel:{{PHONE}}">{{PHONE}}</a>
        </div>
      </section>

      <section class="services" aria-label="Service preview">
        <article class="service"><small>Piece 01</small><p>{{SERVICE_1}}</p></article>
        <article class="service"><small>Piece 02</small><p>{{SERVICE_2}}</p></article>
        <article class="service"><small>Piece 03</small><p>{{SERVICE_3}}</p></article>
      </section>
    </section>

    <aside class="right" aria-label="Prestige visual">
      <div class="stack">
        <div class="piece a"></div>
        <div class="piece b"></div>
        <div class="piece c"></div>
        <div class="caption">{{BUSINESS_NAME}} · Curated presence · {{CITY}}</div>
      </div>
    </aside>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI4 Design Studio — Your Dossier</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:#030816;color:#f5f8ff;display:flex;flex-direction:column}

/* ── ACTION BAR ── */
.bar{
  flex-shrink:0;
  display:flex;align-items:center;gap:.75rem;
  padding:.75rem clamp(.75rem,2vw,1.5rem);
  background:rgba(3,8,22,.96);
  border-bottom:1px solid rgba(184,196,217,.1);
  backdrop-filter:blur(20px);
  z-index:10;
}
.bar-brand{
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;
  letter-spacing:.14em;text-transform:uppercase;color:#5BD3FF;
  white-space:nowrap;margin-right:.25rem;
}
.bar-divider{width:1px;height:22px;background:rgba(184,196,217,.15);flex-shrink:0}
.btn{
  display:inline-flex;align-items:center;gap:.4rem;
  padding:.52rem 1rem;border-radius:999px;
  font-family:'Inter',sans-serif;font-size:.75rem;font-weight:700;
  cursor:pointer;transition:all .18s;white-space:nowrap;border:none;
}
.btn-ghost{background:rgba(255,255,255,.05);color:#AEBED3;border:1px solid rgba(184,196,217,.16)}
.btn-ghost:hover{background:rgba(255,255,255,.1);color:#f5f8ff;border-color:rgba(184,196,217,.32)}
.btn-new{background:rgba(30,167,255,.1);color:#5BD3FF;border:1px solid rgba(30,167,255,.28)}
.btn-new:hover{background:rgba(30,167,255,.2);color:#f5f8ff}
.btn-new:disabled{opacity:.5;cursor:wait}
.btn-select{
  background:linear-gradient(135deg,#f5f8ff,#5BD3FF 44%,#1EA7FF);
  color:#03101f;border:none;
  box-shadow:0 0 28px rgba(30,167,255,.3);
  margin-left:auto;
}
.btn-select:hover{transform:translateY(-1px);box-shadow:0 0 42px rgba(30,167,255,.5)}
.btn-select:disabled{opacity:.5;cursor:wait;transform:none}

.bar-status{
  font-family:'Inter',sans-serif;font-size:.7rem;color:#62728A;
  margin-left:.25rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;
}

/* ── PREVIEW FRAME ── */
.preview-wrap{flex:1;position:relative;overflow:hidden}
#previewFrame{width:100%;height:100%;border:none;background:#fff}

/* ── LOADING OVERLAY ── */
.loading{
  display:none;position:absolute;inset:0;
  background:rgba(3,8,22,.88);backdrop-filter:blur(8px);
  flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;
  z-index:20;
}
.loading.show{display:flex}
.spinner{
  width:48px;height:48px;border-radius:50%;
  border:3px solid rgba(91,211,255,.15);
  border-top-color:#5BD3FF;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#5BD3FF}
.loading-sub{font-size:.76rem;color:#62728A;text-align:center;max-width:320px;line-height:1.6}

/* ── EMPTY STATE ── */
.empty{
  display:none;position:absolute;inset:0;
  flex-direction:column;align-items:center;justify-content:center;gap:1rem;
  z-index:5;
}
.empty.show{display:flex}
.empty-title{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;color:#f5f8ff}
.empty-sub{font-size:.88rem;color:#62728A;text-align:center;max-width:400px;line-height:1.65}

@media(max-width:640px){
  .bar-brand,.bar-divider,.bar-status{display:none}
  .btn{font-size:.68rem;padding:.45rem .75rem}
}
</style>
</head>
<body>

<div class="bar">
  <span class="bar-brand">AI4 Design Studio</span>
  <div class="bar-divider"></div>
  <button class="btn btn-new" id="btnNew" onclick="newDesign()">&#127922; New Design</button>
  <button class="btn btn-ghost" id="btnRewrite" onclick="rewriteCopy()">&#9998; Rewrite Copy</button>
  <span class="bar-status" id="barStatus"></span>
  <button class="btn btn-select" id="btnSelect" onclick="selectSite()" style="display:none">Select This Site &rarr; Continue to Purchase</button>
</div>

<div class="preview-wrap">
  <iframe id="previewFrame" title="Your generated dossier"></iframe>

  <div class="loading" id="loadingOverlay">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Building your dossier&hellip;</div>
    <div class="loading-sub" id="loadingSub">Claude is crafting your agency-quality promotional site. Every element is being written specifically for your business.</div>
  </div>

  <div class="empty" id="emptyState">
    <div class="empty-title">No dossier yet</div>
    <div class="empty-sub">Return to the questionnaire and answer the questions — Claude will build your site from scratch.</div>
    <a href="ai4-design-studio.html" class="btn btn-ghost" style="margin-top:.5rem">&#8592; Back to Questionnaire</a>
  </div>
</div>

<script>
'use strict';

const GENERATE_FN = '/.netlify/functions/generate-agency';

// ── Load state from sessionStorage ──────────────────────────────────
let currentHtml    = '';
let currentContent = null;
let currentAnswers = null;

function load() {
  try {
    const html    = sessionStorage.getItem('ai4_generated_html') || '';
    const content = JSON.parse(sessionStorage.getItem('ai4_gen_content') || 'null');
    const answers = JSON.parse(sessionStorage.getItem('ai4_answers')     || 'null');
    currentHtml    = html;
    currentContent = content;
    currentAnswers = answers;
  } catch(e) {}

  if (currentHtml) {
    renderPreview(currentHtml);
    document.getElementById('btnSelect').style.display = '';
    setStatus('Dossier ready — click New Design for a completely different look');
  } else {
    document.getElementById('emptyState').classList.add('show');
    document.getElementById('btnSelect').style.display = 'none';
  }
}

// ── Render HTML in iframe ────────────────────────────────────────────
function renderPreview(html) {
  const frame = document.getElementById('previewFrame');
  frame.srcdoc = html;
  document.getElementById('emptyState').classList.remove('show');
}

// ── Status bar ───────────────────────────────────────────────────────
function setStatus(msg) {
  document.getElementById('barStatus').textContent = msg;
}

// ── Loading state ────────────────────────────────────────────────────
function setLoading(on, text, sub) {
  const overlay = document.getElementById('loadingOverlay');
  overlay.classList.toggle('show', on);
  if (text) document.getElementById('loadingText').textContent = text;
  if (sub)  document.getElementById('loadingSub').textContent  = sub;
  document.getElementById('btnNew').disabled     = on;
  document.getElementById('btnRewrite').disabled = on;
  document.getElementById('btnSelect').disabled  = on;
}

// ── Call generate function ───────────────────────────────────────────
async function callGenerate(mode) {
  const payload = {
    answers: currentAnswers || {},
    mode,
    existingContent: (mode === 'design' && currentContent) ? currentContent : null
  };

  const res  = await fetch(GENERATE_FN, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });

  if (!res.ok) throw new Error('Generation failed (' + res.status + ')');
  return res.json();
}

// ── New Design — completely different look, same client facts ────────
async function newDesign() {
  setLoading(true,
    'Reimagining your dossier…',
    'Claude is creating a completely different design direction. Same client intelligence — entirely new creative vision.'
  );
  setStatus('');
  try {
    const data = await callGenerate('design');
    currentHtml    = data.html;
    currentContent = data.content || currentContent;
    try {
      sessionStorage.setItem('ai4_generated_html', currentHtml);
      sessionStorage.setItem('ai4_gen_content', JSON.stringify(currentContent));
    } catch(e) {}
    renderPreview(currentHtml);
    document.getElementById('btnSelect').style.display = '';
    setStatus('New design ready — completely different creative direction');
  } catch(err) {
    setStatus('Generation failed — please try again');
    console.error(err);
  }
  setLoading(false);
}

// ── Rewrite Copy — new copy, keep design direction ───────────────────
async function rewriteCopy() {
  setLoading(true,
    'Rewriting your dossier…',
    'Claude is crafting completely new copy for your business. New headlines, new positioning, new energy.'
  );
  setStatus('');
  try {
    const data = await callGenerate('full');
    currentHtml    = data.html;
    currentContent = data.content || currentContent;
    try {
      sessionStorage.setItem('ai4_generated_html', currentHtml);
      sessionStorage.setItem('ai4_gen_content', JSON.stringify(currentContent));
    } catch(e) {}
    renderPreview(currentHtml);
    document.getElementById('btnSelect').style.display = '';
    setStatus('Fresh copy applied — new headlines, new positioning');
  } catch(err) {
    setStatus('Rewrite failed — please try again');
    console.error(err);
  }
  setLoading(false);
}

// ── Select this site ─────────────────────────────────────────────────
async function selectSite() {
  if (!currentHtml) return;

  const btn = document.getElementById('btnSelect');
  btn.disabled = true;
  btn.textContent = 'Saving your dossier…';
  setStatus('Saving your selection…');

  try {
    const email    = (currentAnswers && currentAnswers.email) || sessionStorage.getItem('ai4_email') || '';
    const name     = sessionStorage.getItem('ai4_full_name') || '';
    const business = (currentContent && currentContent.brand) || (currentAnswers && currentAnswers.name) || 'Website Build';

    const saveRes = await fetch('https://ai4websitedesign.com/.netlify/functions/save-build', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email, full_name: name,
        business_name: business,
        built_html: currentHtml,
        site_data: { content: currentContent, answers: currentAnswers },
        template_selected: 'AGENCY-DOSSIER',
        source: 'ai4-design-studio-preview'
      })
    });

    const saved = await saveRes.json().catch(() => ({}));
    const siteId = saved.site_id || '';

    // Redirect to purchasing intake
    const url = new URL('https://ai4-product-purchasing.ai4businesses.org/Website-signup-intake');
    if (siteId) url.searchParams.set('site', siteId);
    if (email)  url.searchParams.set('e', encodeURIComponent(email));
    window.location.href = url.toString();

  } catch(err) {
    console.error('Select error:', err);
    btn.disabled = false;
    btn.textContent = 'Select This Site → Continue to Purchase';
    setStatus('Error saving — please try again');
  }
}

// ── Boot ─────────────────────────────────────────────────────────────
load();
</script>
</body>
</html>

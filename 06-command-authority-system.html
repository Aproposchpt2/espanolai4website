<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{BUSINESS_NAME}} — Command Authority System</title>
  <style>
    :root{
      --void:#020617;
      --panel:#081426;
      --cyan:#3df5ff;
      --violet:#875cff;
      --white:#f4fbff;
      --muted:rgba(244,251,255,.67);
      --line:rgba(61,245,255,.18);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--void);
      color:var(--white);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    a{color:inherit;text-decoration:none}
    .system{
      min-height:100vh;
      background:
        linear-gradient(90deg, rgba(61,245,255,.06) 1px, transparent 1px),
        linear-gradient(rgba(61,245,255,.045) 1px, transparent 1px),
        radial-gradient(circle at 76% 20%, rgba(135,92,255,.3), transparent 34%),
        radial-gradient(circle at 18% 78%, rgba(61,245,255,.18), transparent 30%),
        #020617;
      background-size:54px 54px,54px 54px,auto,auto,auto;
      position:relative;
      overflow:hidden;
    }
    .system::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, transparent, rgba(2,6,23,.72));
      pointer-events:none;
    }
    nav{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:24px clamp(20px,5vw,70px);
      border-bottom:1px solid var(--line);
      text-transform:uppercase;
      letter-spacing:.17em;
      font-size:11px;
      color:rgba(244,251,255,.72);
    }
    .brand{font-weight:950;color:var(--white)}
    .status{
      display:flex;align-items:center;gap:10px;
    }
    .pulse{
      width:9px;height:9px;border-radius:50%;background:var(--cyan);
      box-shadow:0 0 18px var(--cyan);
    }
    .hero{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:minmax(0,1fr) minmax(320px,540px);
      gap:clamp(28px,6vw,80px);
      align-items:center;
      padding:clamp(44px,7vw,96px) clamp(20px,5vw,70px) 70px;
      min-height:calc(100vh - 74px);
    }
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:12px;
      color:var(--cyan);
      text-transform:uppercase;
      letter-spacing:.24em;
      font-size:12px;
      margin-bottom:24px;
    }
    .eyebrow::before{
      content:"";width:42px;height:1px;background:var(--cyan);box-shadow:0 0 12px var(--cyan);
    }
    h1{
      margin:0;
      font-size:clamp(48px,8vw,126px);
      line-height:.88;
      letter-spacing:-.085em;
      font-weight:950;
      max-width:980px;
    }
    .description{
      margin:28px 0 34px;
      color:var(--muted);
      line-height:1.72;
      font-size:clamp(16px,1.45vw,20px);
      max-width:670px;
    }
    .actions{display:flex;gap:14px;flex-wrap:wrap}
    .primary{
      padding:17px 24px;
      background:linear-gradient(135deg,var(--cyan),#e8fdff);
      color:#020617;
      border-radius:14px;
      font-weight:950;
      box-shadow:0 20px 60px rgba(61,245,255,.24);
    }
    .secondary{
      padding:16px 22px;
      border:1px solid var(--line);
      border-radius:14px;
      color:rgba(244,251,255,.82);
      background:rgba(8,20,38,.45);
    }
    .dashboard{
      min-height:620px;
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(8,20,38,.9), rgba(8,20,38,.42));
      box-shadow:0 40px 120px rgba(0,0,0,.45), inset 0 0 45px rgba(61,245,255,.04);
      padding:18px;
      position:relative;
      overflow:hidden;
    }
    .dashboard::before{
      content:"";
      position:absolute;
      inset:-40%;
      background:conic-gradient(from 180deg, transparent, rgba(61,245,255,.12), transparent, rgba(135,92,255,.12), transparent);
      animation:spin 14s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .dash-inner{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;height:100%;gap:16px}
    .dash-top,.dash-bottom{
      display:flex;justify-content:space-between;align-items:center;
      border:1px solid rgba(244,251,255,.1);
      border-radius:18px;
      padding:16px;
      background:rgba(2,6,23,.52);
      text-transform:uppercase;
      letter-spacing:.15em;
      font-size:10px;
      color:rgba(244,251,255,.67);
    }
    .radar{
      border:1px solid rgba(244,251,255,.1);
      border-radius:24px;
      background:
        radial-gradient(circle, transparent 0 18%, rgba(61,245,255,.08) 18.5% 19%, transparent 19.5% 37%, rgba(61,245,255,.08) 37.5% 38%, transparent 38.5% 60%),
        linear-gradient(90deg, transparent 49.8%, rgba(61,245,255,.24) 50%, transparent 50.2%),
        linear-gradient(transparent 49.8%, rgba(61,245,255,.24) 50%, transparent 50.2%),
        rgba(2,6,23,.42);
      position:relative;
      overflow:hidden;
    }
    .radar::after{
      content:"";
      position:absolute;
      width:65%;height:65%;
      left:17%;top:17%;
      background:conic-gradient(from 45deg, rgba(61,245,255,.38), transparent 45%);
      border-radius:50%;
      opacity:.72;
    }
    .services{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      padding:0 clamp(20px,5vw,70px) 70px;
    }
    .node{
      border:1px solid var(--line);
      background:rgba(8,20,38,.58);
      border-radius:22px;
      padding:26px;
      min-height:175px;
    }
    .node small{color:var(--cyan);letter-spacing:.18em;text-transform:uppercase}
    .node h2{margin:38px 0 0;font-size:clamp(20px,2vw,31px);line-height:1.08;letter-spacing:-.04em}
    @media(max-width:940px){
      nav{flex-direction:column;align-items:flex-start;gap:12px}
      .hero{grid-template-columns:1fr;min-height:auto}
      .dashboard{order:-1;min-height:440px}
      h1{font-size:clamp(46px,14vw,86px)}
      .services{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <main class="system">
    <nav>
      <a class="brand" href="{{CTA_LINK}}">{{BUSINESS_NAME}}</a>
      <span class="status"><i class="pulse"></i> Live command presence · {{CITY}}</span>
    </nav>

    <section class="hero">
      <div>
        <div class="eyebrow">Command Authority System</div>
        <h1>{{HEADLINE}}</h1>
        <p class="description">{{DESCRIPTION}}</p>
        <div class="actions">
          <a class="primary" href="{{CTA_LINK}}">{{CTA_TEXT}}</a>
          <a class="secondary" href="tel:{{PHONE}}">{{PHONE}}</a>
        </div>
      </div>

      <aside class="dashboard" aria-label="Trust signal">
        <div class="dash-inner">
          <div class="dash-top"><span>Authority Grid</span><span>{{CITY}}</span></div>
          <div class="radar"></div>
          <div class="dash-bottom"><span>{{BUSINESS_NAME}}</span><span>Premium Signal</span></div>
        </div>
      </aside>
    </section>

    <section class="services" aria-label="Service preview">
      <article class="node"><small>System 01</small><h2>{{SERVICE_1}}</h2></article>
      <article class="node"><small>System 02</small><h2>{{SERVICE_2}}</h2></article>
      <article class="node"><small>System 03</small><h2>{{SERVICE_3}}</h2></article>
    </section>
  </main>
</body>
</html>

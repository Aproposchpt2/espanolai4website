<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{BUSINESS_NAME}} — Premium Launch System</title>
  <style>
    :root{
      --ink:#090a0f;
      --white:#fffaf0;
      --sun:#ffcf5a;
      --coral:#ff5f57;
      --blue:#5fd7ff;
      --muted:rgba(255,250,240,.72);
      --line:rgba(255,250,240,.14);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:var(--ink);
      color:var(--white);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
    }
    a{text-decoration:none;color:inherit}
    .launch{
      min-height:100vh;
      background:
        radial-gradient(circle at 16% 20%, rgba(255,207,90,.18), transparent 28%),
        radial-gradient(circle at 84% 16%, rgba(95,215,255,.18), transparent 30%),
        radial-gradient(circle at 52% 72%, rgba(255,95,87,.20), transparent 30%),
        linear-gradient(180deg,#090a0f,#13111b);
      overflow:hidden;
      position:relative;
    }
    .orbit{
      position:absolute;
      right:-18vw;
      top:6vh;
      width:66vw;
      aspect-ratio:1;
      border:1px solid rgba(255,250,240,.16);
      border-radius:50%;
      box-shadow:0 0 0 60px rgba(255,250,240,.025), 0 0 0 132px rgba(255,250,240,.018);
      z-index:0;
    }
    .orbit::before{
      content:"";
      position:absolute;
      width:22px;height:22px;border-radius:50%;
      background:var(--sun);
      left:12%;top:18%;
      box-shadow:0 0 30px rgba(255,207,90,.7);
    }
    nav{
      position:relative;
      z-index:2;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:26px clamp(20px,5vw,72px);
      text-transform:uppercase;
      letter-spacing:.16em;
      color:rgba(255,250,240,.7);
      font-size:11px;
    }
    .brand{font-weight:950;color:var(--white);letter-spacing:.22em}
    .hero{
      position:relative;
      z-index:1;
      min-height:calc(100vh - 77px);
      display:grid;
      grid-template-columns:1.05fr .95fr;
      align-items:center;
      gap:clamp(30px,5vw,70px);
      padding:clamp(40px,6vw,90px) clamp(20px,5vw,72px) 70px;
    }
    .eyebrow{
      color:var(--sun);
      text-transform:uppercase;
      letter-spacing:.24em;
      font-size:12px;
      margin-bottom:24px;
    }
    h1{
      margin:0;
      font-size:clamp(50px,8.7vw,132px);
      line-height:.83;
      letter-spacing:-.09em;
      text-transform:uppercase;
      font-weight:1000;
    }
    .description{
      margin:28px 0 34px;
      max-width:650px;
      color:var(--muted);
      line-height:1.72;
      font-size:clamp(16px,1.45vw,20px);
    }
    .actions{display:flex;gap:14px;flex-wrap:wrap}
    .primary{
      padding:17px 24px;
      border-radius:999px;
      background:var(--white);
      color:var(--ink);
      font-weight:950;
      box-shadow:0 20px 55px rgba(255,207,90,.18);
    }
    .secondary{
      padding:16px 22px;
      border-radius:999px;
      border:1px solid var(--line);
      color:rgba(255,250,240,.84);
    }
    .launch-card{
      min-height:620px;
      position:relative;
      display:grid;
      place-items:center;
    }
    .device{
      width:min(430px,90%);
      aspect-ratio:.72;
      border-radius:42px;
      background:
        linear-gradient(135deg, rgba(255,255,255,.16), rgba(255,255,255,.03)),
        rgba(255,255,255,.04);
      border:1px solid rgba(255,250,240,.22);
      padding:18px;
      transform:rotate(4deg);
      box-shadow:0 45px 115px rgba(0,0,0,.55);
    }
    .screen{
      height:100%;
      border-radius:30px;
      border:1px solid rgba(255,250,240,.13);
      background:
        linear-gradient(150deg, rgba(9,10,15,.1), rgba(9,10,15,.7)),
        radial-gradient(circle at 35% 20%, rgba(255,207,90,.44), transparent 30%),
        radial-gradient(circle at 74% 72%, rgba(95,215,255,.24), transparent 28%),
        linear-gradient(135deg,#ff5f57,#16111c 48%,#5fd7ff);
      position:relative;
      overflow:hidden;
    }
    .screen::after{
      content:"LAUNCH READY";
      position:absolute;
      bottom:26px;
      left:24px;
      right:24px;
      padding:18px;
      border:1px solid rgba(255,250,240,.18);
      border-radius:18px;
      background:rgba(9,10,15,.55);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:10px;
      color:rgba(255,250,240,.75);
    }
    .badge{
      position:absolute;
      left:4%;
      bottom:18%;
      padding:18px 20px;
      border-radius:18px;
      background:rgba(255,250,240,.88);
      color:var(--ink);
      font-weight:900;
      box-shadow:0 20px 50px rgba(0,0,0,.32);
    }
    .services{
      position:relative;
      z-index:1;
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:14px;
      padding:0 clamp(20px,5vw,72px) 70px;
    }
    .service{
      border:1px solid var(--line);
      border-radius:28px;
      min-height:185px;
      padding:28px;
      background:linear-gradient(180deg,rgba(255,255,255,.055),rgba(255,255,255,.018));
    }
    .service small{letter-spacing:.18em;text-transform:uppercase;color:var(--sun)}
    .service h2{margin:42px 0 0;font-size:clamp(21px,2.2vw,34px);line-height:1.05;letter-spacing:-.045em}
    @media(max-width:900px){
      nav{flex-direction:column;align-items:flex-start;gap:12px}
      .hero{grid-template-columns:1fr;min-height:auto}
      .launch-card{order:-1;min-height:460px}
      h1{font-size:clamp(48px,15vw,88px)}
      .orbit{width:120vw;right:-65vw}
      .services{grid-template-columns:1fr}
      .device{transform:rotate(0)}
    }
  </style>
</head>
<body>
  <main class="launch">
    <div class="orbit"></div>
    <nav>
      <a class="brand" href="{{CTA_LINK}}">{{BUSINESS_NAME}}</a>
      <span>{{CITY}} · {{PHONE}}</span>
    </nav>

    <section class="hero">
      <div>
        <div class="eyebrow">Premium Launch System</div>
        <h1>{{HEADLINE}}</h1>
        <p class="description">{{DESCRIPTION}}</p>
        <div class="actions">
          <a class="primary" href="{{CTA_LINK}}">{{CTA_TEXT}}</a>
          <a class="secondary" href="tel:{{PHONE}}">Call {{PHONE}}</a>
        </div>
      </div>
      <aside class="launch-card" aria-label="Launch visual">
        <div class="device"><div class="screen"></div></div>
        <div class="badge">{{CITY}} launch signal</div>
      </aside>
    </section>

    <section class="services" aria-label="Offer preview">
      <article class="service"><small>Launch 01</small><h2>{{SERVICE_1}}</h2></article>
      <article class="service"><small>Launch 02</small><h2>{{SERVICE_2}}</h2></article>
      <article class="service"><small>Launch 03</small><h2>{{SERVICE_3}}</h2></article>
    </section>
  </main>
</body>
</html>

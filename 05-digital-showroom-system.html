<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{BUSINESS_NAME}} — Digital Showroom System</title>
  <style>
    :root{
      --gallery:#ece8df;
      --charcoal:#111317;
      --clay:#8f7964;
      --line:rgba(17,19,23,.13);
      --soft:#faf8f2;
      --glass:rgba(255,255,255,.54);
    }
    *{box-sizing:border-box}
    html{background:var(--gallery)}
    body{
      margin:0;
      color:var(--charcoal);
      font-family:Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background:
        linear-gradient(90deg, var(--line) 1px, transparent 1px),
        linear-gradient(var(--line) 1px, transparent 1px),
        var(--gallery);
      background-size:96px 96px;
    }
    a{text-decoration:none;color:inherit}
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:30px clamp(20px,5vw,72px);
      text-transform:uppercase;
      letter-spacing:.18em;
      font-size:11px;
    }
    .brand{font-weight:900;letter-spacing:.22em}
    .hero{
      min-height:calc(100vh - 83px);
      display:grid;
      grid-template-columns:.9fr 1.1fr;
      align-items:center;
      gap:clamp(30px,6vw,80px);
      padding:20px clamp(20px,5vw,72px) 72px;
    }
    .copy{position:relative;z-index:2}
    .eyebrow{
      display:inline-block;
      padding:10px 13px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(250,248,242,.66);
      text-transform:uppercase;
      letter-spacing:.2em;
      color:var(--clay);
      font-size:11px;
      margin-bottom:24px;
    }
    h1{
      margin:0;
      font-size:clamp(48px,7.8vw,118px);
      line-height:.88;
      letter-spacing:-.08em;
      max-width:880px;
      font-weight:900;
    }
    .description{
      margin:28px 0 34px;
      max-width:600px;
      color:rgba(17,19,23,.7);
      line-height:1.72;
      font-size:clamp(16px,1.45vw,20px);
    }
    .actions{display:flex;gap:14px;flex-wrap:wrap}
    .primary{
      padding:17px 24px;
      border-radius:999px;
      background:var(--charcoal);
      color:var(--soft);
      font-weight:850;
      box-shadow:0 20px 60px rgba(17,19,23,.18);
    }
    .secondary{
      padding:16px 22px;
      border:1px solid var(--line);
      border-radius:999px;
      background:rgba(250,248,242,.5);
    }
    .showroom{
      min-height:650px;
      position:relative;
      display:grid;
      grid-template-columns:1fr 1fr;
      grid-template-rows:1fr 1fr;
      gap:18px;
      transform:perspective(1200px) rotateY(-5deg);
    }
    .plinth{
      border:1px solid var(--line);
      border-radius:30px;
      background:var(--glass);
      backdrop-filter:blur(14px);
      box-shadow:0 35px 80px rgba(17,19,23,.13);
      position:relative;
      overflow:hidden;
      min-height:280px;
    }
    .plinth.one{grid-row:1/3}
    .plinth.two{transform:translateY(58px)}
    .plinth.three{transform:translateY(-12px)}
    .plinth::before{
      content:"";
      position:absolute;
      inset:24px;
      border:1px solid rgba(17,19,23,.1);
      border-radius:22px;
    }
    .plinth::after{
      content:"";
      position:absolute;
      width:78%;
      height:48%;
      left:11%;
      top:24%;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 0%, rgba(143,121,100,.34), transparent 54%),
        linear-gradient(135deg, rgba(17,19,23,.12), transparent);
      transform:rotate(-16deg);
    }
    .tag{
      position:absolute;
      left:24px;bottom:24px;
      right:24px;
      padding:18px;
      background:rgba(250,248,242,.72);
      border:1px solid var(--line);
      border-radius:18px;
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.16em;
      color:rgba(17,19,23,.68);
    }
    .services{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:18px;
      padding:0 clamp(20px,5vw,72px) 70px;
    }
    .service{
      min-height:190px;
      border:1px solid var(--line);
      background:rgba(250,248,242,.58);
      border-radius:28px;
      padding:28px;
    }
    .service b{display:block;color:var(--clay);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
    .service span{display:block;margin-top:44px;font-size:clamp(20px,2vw,30px);line-height:1.08;letter-spacing:-.04em;font-weight:800}
    @media(max-width:940px){
      .top{align-items:flex-start;flex-direction:column;gap:12px}
      .hero{grid-template-columns:1fr}
      .showroom{min-height:470px;transform:none;grid-template-columns:1fr 1fr;order:-1}
      .plinth{min-height:210px;border-radius:22px}
      .plinth.two,.plinth.three{transform:none}
      h1{font-size:clamp(48px,14vw,86px)}
      .services{grid-template-columns:1fr}
    }
    @media(max-width:560px){
      .showroom{grid-template-columns:1fr;gap:12px}
      .plinth.one{grid-row:auto}
      .plinth{min-height:180px}
    }
  </style>
</head>
<body>
  <header class="top">
    <a class="brand" href="{{CTA_LINK}}">{{BUSINESS_NAME}}</a>
    <span>{{CITY}} · {{PHONE}}</span>
  </header>

  <main>
    <section class="hero">
      <div class="copy">
        <span class="eyebrow">Digital Showroom System</span>
        <h1>{{HEADLINE}}</h1>
        <p class="description">{{DESCRIPTION}}</p>
        <div class="actions">
          <a class="primary" href="{{CTA_LINK}}">{{CTA_TEXT}}</a>
          <a class="secondary" href="tel:{{PHONE}}">{{PHONE}}</a>
        </div>
      </div>

      <aside class="showroom" aria-label="Premium showroom visual">
        <div class="plinth one"><div class="tag">Signature presence</div></div>
        <div class="plinth two"><div class="tag">Curated experience</div></div>
        <div class="plinth three"><div class="tag">{{CITY}}</div></div>
      </aside>
    </section>

    <section class="services" aria-label="Service preview">
      <article class="service"><b>Exhibit 01</b><span>{{SERVICE_1}}</span></article>
      <article class="service"><b>Exhibit 02</b><span>{{SERVICE_2}}</span></article>
      <article class="service"><b>Exhibit 03</b><span>{{SERVICE_3}}</span></article>
    </section>
  </main>
</body>
</html>
